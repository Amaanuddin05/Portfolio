<section
  id="contact"
  class="contact"
  aria-label="Contact Amaan"
>
  <div
    class="contact-inner container-max"
    style="padding-left: clamp(1.5rem, 5vw, 5rem); padding-right: clamp(1.5rem, 5vw, 5rem);"
  >
    <!-- Heading -->
    <h2 class="contact-heading">
      <span class="heading-line"><span class="heading-inner">Let's build</span></span>
      <span class="heading-line"><span class="heading-inner">something real.</span></span>
    </h2>

    <!-- Subtext + availability -->
    <div class="contact-sub">
      <p class="contact-desc">
        Open to full-time roles, freelance, and collaborations.
        If you have an interesting problem, let's talk.
      </p>

      <div class="contact-avail">
        <span class="avail-dot" aria-hidden="true"></span>
        <span class="avail-text">Available for new opportunities</span>
      </div>
    </div>

    <!-- Email CTA — large, interactive -->
    <div class="contact-email-block">
      <a
        href="mailto:amaanuddin.dev@gmail.com"
        class="contact-email-link"
        aria-label="Send Amaan an email at amaanuddin.dev@gmail.com"
      >
        <span class="email-address">amaanuddin.dev&#64;gmail.com</span>
        <svg
          class="email-arrow-icon"
          viewBox="0 0 24 24"
          fill="none"
          width="22"
          height="22"
          aria-hidden="true"
        >
          <path
            d="M5 19 L19 5 M10 5 h9 v9"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>

      <a

        rel="noopener noreferrer"
        class="contact-link"
        aria-label="Amaan on LinkedIn"

        rel="noopener noreferrer"
        class="contact-link"
        aria-label="Download Amaan's resume PDF"
